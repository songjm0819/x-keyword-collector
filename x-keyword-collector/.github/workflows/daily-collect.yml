name: Daily X Keyword Collector

on:
  # 매일 한국시간(KST) 오전 7시 = UTC 전날 22:00
  schedule:
    - cron: "0 22 * * *"
  # 필요할 때 수동으로도 실행 가능
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 트윗 수집 및 구글 시트 저장
        env:
          TWITTERAPI_IO_KEY: ${{ secrets.TWITTERAPI_IO_KEY }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SEARCH_KEYWORD: "생리대"
        run: python collect_tweets.py
